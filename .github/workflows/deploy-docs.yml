name: Deploy Course Docs to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"

  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs and Material theme
        run: pip install mkdocs-material

      - name: Build with MkDocs
        run: mkdocs build

      - name: Copy HTML files to site
        run: |
          cp docs/databricks/*.html site/databricks/ 2>/dev/null || true
          echo "HTML files copied"

      - name: Deploy to GitHub Pages
        run: |
          cd site
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy with HTML files"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Databricks Data Intelligence Platform — Mind Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --c0: #E87722; /* Data Engineering */
    --c1: #1B6CA8; /* Data Governance */
    --c2: #7B2FBE; /* Mosaic AI */
    --c3: #0E8A6E; /* Analytics & BI */
    --c4: #C0392B; /* Security */
    --c5: #2C7BB6; /* Infrastructure */
    --c6: #D4AC0D; /* Cost & Billing */
    --c7: #1A7A4A; /* Migration & Adoption */
    --c8: #5D6D7E; /* Monitoring & Ops */
    --bg: #0f1117;
    --surface: #1a1d27;
    --text: #e8eaf0;
    --muted: #8b9ab0;
    --border: #2a2f45;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 16px;
  }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  #header span { font-size: 12px; color: var(--muted); }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #canvas { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; }

  .node circle {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.15s, filter 0.15s;
  }
  .node circle:hover { filter: brightness(1.3); }
  .node text {
    pointer-events: none;
    font-size: 11px;
    fill: var(--text);
    text-anchor: middle;
    dominant-baseline: central;
  }
  .node.root circle { stroke-width: 3; }

  .link {
    fill: none;
    stroke: var(--border);
    stroke-width: 1.5;
    opacity: 0.6;
  }

  /* Panel */
  #panel {
    position: fixed; top: 58px; right: 0; bottom: 0; width: 340px;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.25s ease;
    overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  #panel.open { transform: translateX(0); }
  #panel-close {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; line-height: 1;
  }
  #panel-close:hover { color: var(--text); }
  #panel-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 3px; margin-bottom: 4px;
  }
  #panel-title { font-size: 17px; font-weight: 700; line-height: 1.3; }
  #panel-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  #panel-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 12px;
    border: 1px solid var(--border); color: var(--muted); background: var(--bg);
  }
  #panel-notes { border-top: 1px solid var(--border); padding-top: 10px; }
  #panel-notes a { color: #4CAF50; font-size: 13px; text-decoration: none; }
  #panel-notes a:hover { text-decoration: underline; }
  .panel-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(15,17,23,0.95); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-size: 12px;
    color: var(--text); max-width: 260px; line-height: 1.5;
    display: none; z-index: 200;
  }

  #hint { position: fixed; bottom: 12px; left: 12px; font-size: 11px; color: var(--muted); }

  /* Priority chips */
  .tag-critical { background: #3d1515; border-color: #7b2525; color: #f08080; }
  .tag-new      { background: #1a3d1a; border-color: #2d7a2d; color: #7ee07e; }
  .tag-quick    { background: #1a2a3d; border-color: #2d567a; color: #7eb8f0; }
  .tag-skip     { background: #2a2a2a; border-color: #444;    color: #888; }
</style>
</head>

// ── BUILD FLAT NODE + LINK ARRAYS ──────────────────────────────────────────
const nodes = [], links = [];
let idCounter = 0;

function flatten(node, parent, depth) {
  node.id = idCounter++;
  node.depth = depth;
  node._children = null;
  nodes.push(node);
  if (parent !== null) links.push({ source: parent.id, target: node.id });
  if (node.children) {
    node._children = node.children;
    node.children.forEach(c => flatten(c, node, depth + 1));
    // start collapsed at depth > 1
    if (depth >= 1) {
      node.children = null;
    }
  }
}
flatten(raw, null, 0);

// ── COLOUR HELPERS ─────────────────────────────────────────────────────────
function nodeColor(d) {
  if (d.depth === 0) return '#ffffff';
  const idx = d.domain !== undefined ? d.domain : (d._children || d.children ? d.domain : d.domain);
  return COLORS[idx] || '#888';
}
function darken(hex, amt = 40) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16)-amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16)-amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16)-amt);
  return `rgb(${r},${g},${b})`;
}

// ── LEGEND ─────────────────────────────────────────────────────────────────
const legend = document.getElementById('legend');
DOMAINS.forEach((d,i) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-dot" style="background:${COLORS[i]}"></span>${d}`;
  legend.appendChild(el);
});

// ── SVG SETUP ──────────────────────────────────────────────────────────────
const svg = d3.select('#canvas');
const W = window.innerWidth, H = window.innerHeight - 48;
svg.attr('width', W).attr('height', H);
const g = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.15, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2));

// ── SIMULATION ─────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.source.depth === 0) return 220;
    if (d.source.depth === 1) return 160;
    return 130;
  }).strength(0.8))
  .force('charge', d3.forceManyBody().strength(d => d.depth === 0 ? -1200 : d.depth === 1 ? -600 : -300))
  .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 18))
  .force('center', d3.forceCenter(0, 0).strength(0.05));

function nodeRadius(d) {
  if (d.depth === 0) return 46;
  if (d.depth === 1) return 34;
  return 26;
}

// ── DRAW ───────────────────────────────────────────────────────────────────
let linkSel = g.append('g').selectAll('.link');
let nodeSel = g.append('g').selectAll('.node');

function update() {
  // Build visible sets
  const visibleNodes = nodes.filter(d => isVisible(d));
  const visibleLinks = links.filter(l => {
    const s = typeof l.source === 'object' ? l.source : nodes[l.source];
    const t = typeof l.target === 'object' ? l.target : nodes[l.target];
    return isVisible(s) && isVisible(t);
  });

  // Links
  linkSel = linkSel.data(visibleLinks, d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return `${s}-${t}`;
  });
  linkSel.exit().remove();
  linkSel = linkSel.enter().append('line').attr('class','link').merge(linkSel);

  // Nodes
  nodeSel = nodeSel.data(visibleNodes, d => d.id);
  nodeSel.exit().remove();
  const enter = nodeSel.enter().append('g')
    .attr('class', d => 'node' + (d.depth === 0 ? ' root' : ''))
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e, d) => { e.stopPropagation(); toggle(d); openPanel(d); })
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip);

  enter.append('circle');

  // multi-line label
  enter.each(function(d) {
    const lines = d.name.split('\n');
    const lineH = 13;
    const totalH = lines.length * lineH;
    const el = d3.select(this);
    lines.forEach((line, i) => {
      el.append('text')
        .attr('dy', (i * lineH - totalH/2 + lineH/2) + 'px')
        .style('font-size', d.depth === 0 ? '11px' : d.depth === 1 ? '10px' : '9px')
        .style('font-weight', d.depth <= 1 ? '600' : '400')
        .text(line);
    });
  });

  nodeSel = enter.merge(nodeSel);

  nodeSel.select('circle')
    .attr('r', nodeRadius)
    .attr('fill', d => {
      if (d.depth === 0) return '#1e2130';
      return darken(nodeColor(d), 30);
    })
    .attr('stroke', nodeColor)
    .attr('stroke-width', d => d.depth === 0 ? 3 : 2)
    .attr('stroke-dasharray', d => (d._children && !d.children) ? '4,2' : null);

  // restart sim with new nodes
  simulation.nodes(visibleNodes);
  simulation.force('link').links(visibleLinks);
  simulation.alpha(0.4).restart();
}

function isVisible(d) {
  if (d.depth === 0) return true;
  // walk up to root: every ancestor must have children (not collapsed)
  let cur = d;
  while (cur.depth > 0) {
    const par = nodes.find(n => {
      const kids = n.children || [];
      return kids.includes(cur);
    });
    if (!par) return false;
    if (!par.children) return false;
    cur = par;
  }
  return true;
}

simulation.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

update();

// ── COLLAPSE / EXPAND ──────────────────────────────────────────────────────
function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
  }
  update();
}

// ── PANEL ─────────────────────────────────────────────────────────────────
const panel = document.getElementById('panel');
document.getElementById('panel-close').addEventListener('click', () => panel.classList.remove('open'));
svg.on('click', () => panel.classList.remove('open'));

function openPanel(d) {
  const color = nodeColor(d);
  const badge = document.getElementById('panel-badge');
  badge.textContent = d.depth === 0 ? 'Platform' : DOMAINS[d.domain] || '';
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = `1px solid ${color}55`;

  document.getElementById('panel-title').textContent = d.name.replace(/\n/g, ' ');
  document.getElementById('panel-desc').textContent = d.desc || '';

  const chipsEl = document.getElementById('panel-chips');
  const chipsLabel = document.getElementById('chips-label');
  chipsEl.innerHTML = '';
  if (d.chips && d.chips.length) {
    chipsLabel.style.display = '';
    d.chips.forEach(c => {
      const s = document.createElement('span');
      s.className = 'chip';
      s.textContent = c;
      chipsEl.appendChild(s);
    });
  } else {
    chipsLabel.style.display = 'none';
  }

  // Priority tag
  if (d.tag) {
    const tagEl = document.createElement('span');
    tagEl.className = `chip tag-${d.tag}`;
    tagEl.textContent = d.tag;
    chipsEl.prepend(tagEl);
    chipsLabel.style.display = '';
  }

  // SA Notes
  const notesEl = document.getElementById('panel-notes');
  const notesLink = document.getElementById('notes-link');
  const title = d.name.replace(/\n/g,' ');
  const matchKey = Object.keys(NOTES_MAP).find(k => title.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(title.toLowerCase()));
  if (matchKey) {
    notesLink.href = NOTES_MAP[matchKey];
    notesEl.style.display = '';
  } else {
    notesEl.style.display = 'none';
  }

  panel.classList.add('open');
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, d) {
  const short = (d.desc || '').substring(0, 120) + ((d.desc||'').length > 120 ? '…' : '');
  tooltip.innerHTML = `<strong>${d.name.replace(/\n/g,' ')}</strong><br/>${short}`;
  tooltip.style.display = 'block';
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 14) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ── RESIZE ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W2 = window.innerWidth, H2 = window.innerHeight - 48;
  svg.attr('width', W2).attr('height', H2);
});
</script>

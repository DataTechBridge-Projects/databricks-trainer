site_name: Tech Ramp Up
site_description: A multi-agent AI system that generates technical training courses for pre-sales Solution Architects — powered by LangGraph and local LLM inference
site_author: Tech Ramp Up
site_url: https://datechbridge-projects.github.io/databricks-trainer/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - AWS:
    - Home: aws/index.md
    # AWS_SECTIONS_START
    - "1. Course Introduction": aws/section_01_course_introduction.md
    - "2. Exam Overview and Strategy": aws/section_02_exam_overview_and_strategy.md
    - "3. AWS Data Architecture Foundations": aws/section_03_aws_data_architecture_foundations.md
    - "4. Data Ingestion": aws/section_04_data_ingestion.md
    - "5. AWS Glue Deep Dive": aws/section_05_aws_glue_deep_dive.md
    - "6. Amazon S3 and Data Lake Design": aws/section_06_amazon_s3_and_data_lake_design.md
    - "7. Amazon Athena": aws/section_07_amazon_athena.md
    - "8. Amazon Redshift": aws/section_08_amazon_redshift.md
    - "9. Streaming Data with Kinesis and MSK": aws/section_09_streaming_data_with_kinesis_and_msk.md
    - "10. NoSQL and Purpose-Built Databases": aws/section_10_nosql_and_purposebuilt_databases.md
    - "11. AWS Lake Formation and Data Governance": aws/section_11_aws_lake_formation_and_data_governance.md
    - "12. Data Orchestration and Pipelines": aws/section_12_data_orchestration_and_pipelines.md
    - "13. Performance, Cost Optimization, and Monitoring": aws/section_13_performance_cost_optimization_and_monitoring.md
    - "14. Security, Compliance, and Networking": aws/section_14_security_compliance_and_networking.md
    - "15. Capstone and Exam Readiness": aws/section_15_capstone_and_exam_readiness.md
    # AWS_SECTIONS_END
    - SA Quick Reference:
      # AWS_NOTES_START
      - "1. Course Introduction": aws/notes/notes_section_01_course_introduction.md
      - "2. Exam Overview and Strategy": aws/notes/notes_section_02_exam_overview_and_strategy.md
      - "3. AWS Data Architecture Foundations": aws/notes/notes_section_03_aws_data_architecture_foundations.md
      - "4. Data Ingestion": aws/notes/notes_section_04_data_ingestion.md
      - "5. AWS Glue Deep Dive": aws/notes/notes_section_05_aws_glue_deep_dive.md
      - "6. Amazon S3 and Data Lake Design": aws/notes/notes_section_06_amazon_s3_and_data_lake_design.md
      # AWS_NOTES_END

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com

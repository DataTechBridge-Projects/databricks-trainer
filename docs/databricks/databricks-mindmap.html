<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databricks Docs — Study Mind Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e4ee;--text2:#8b90a4;--text3:#4e5368;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--text);overflow:hidden;}
svg{width:100%;height:100%;position:absolute;top:0;left:0;}

/* Panel */
#panel{position:absolute;top:20px;right:20px;width:310px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px;display:none;flex-direction:column;gap:10px;max-height:calc(100vh - 40px);overflow-y:auto;z-index:10;}
#panel.vis{display:flex;}
.pcl{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;line-height:1;}
.pcl:hover{color:var(--text);}
.p-hint{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.p-title{font-size:16px;font-weight:500;line-height:1.3;}
.p-parent{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.p-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace;width:fit-content;}
.be{background:rgba(224,85,85,.14);color:#e07070;border:1px solid rgba(224,85,85,.28);}
.bn{background:rgba(124,92,191,.14);color:#a585e0;border:1px solid rgba(124,92,191,.28);}
.br{background:rgba(196,122,26,.14);color:#d4943a;border:1px solid rgba(196,122,26,.28);}
.bs{background:rgba(46,125,82,.12);color:#5aab80;border:1px solid rgba(46,125,82,.24);}
.p-desc{font-size:12px;line-height:1.65;color:var(--text2);padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);}
.p-div{height:1px;background:var(--border);}
.p-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;padding:7px 12px;border-radius:7px;border:1px solid var(--border2);background:none;color:var(--text);cursor:pointer;text-decoration:none;transition:background .12s;}
.p-btn:hover{background:var(--bg3);}
.p-btn.pri{background:rgba(79,142,247,.11);border-color:rgba(79,142,247,.32);color:#7ab0ff;}
.p-btn.pri:hover{background:rgba(79,142,247,.2);}
.c-tl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:background .1s,color .1s;}
.chip:hover{background:var(--border2);color:var(--text);}

/* Legend */
#legend{position:absolute;bottom:18px;left:18px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;flex-direction:column;gap:5px;z-index:10;}
.lg-t{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
.lg-r{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text2);}
.lg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Header */
#hdr{position:absolute;top:18px;left:18px;z-index:10;}
#hdr h1{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.04em;}
#hdr p{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

/* Hint */
#hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:5px 13px;border-radius:20px;pointer-events:none;transition:opacity .5s;z-index:10;}

/* Toolbar */
#toolbar{position:absolute;top:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
.tb-btn{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:background .12s,color .12s;}
.tb-btn:hover{background:var(--bg3);color:var(--text);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

@keyframes pulse-ring{0%{r:0;opacity:0.6;}100%{r:38;opacity:0;}}
.pulse-circle{animation:pulse-ring 0.45s ease-out forwards;pointer-events:none;}
.expand-badge{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;pointer-events:none;}
</style>
</head>
<body>

<div id="hdr"><h1>Databricks Docs</h1><p>Associate Developer Exam — Study Mind Map</p></div>

<div id="toolbar">
  <button class="tb-btn" onclick="expandAll()">expand all</button>
  <button class="tb-btn" onclick="collapseAll()">collapse all</button>
  <button class="tb-btn" onclick="resetZoom()">reset view</button>
</div>

<div id="hint">single-click: info panel &nbsp;·&nbsp; double-click: expand / collapse &nbsp;·&nbsp; drag &amp; scroll to navigate</div>

<div id="panel">
  <button class="pcl" id="pcl">&#x2715;</button>
  <div class="p-hint" id="ph"></div>
  <div class="p-title" id="pt"></div>
  <div class="p-parent" id="pp"></div>
  <div class="p-badge" id="pb"></div>
  <div class="p-desc" id="pd"></div>
  <div class="p-div"></div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;">
    <a class="p-btn pri" id="pbtn" href="#" target="_blank">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      open docs
    </a>
  </div>
  <div id="pch" style="display:none;">
    <div class="p-div"></div>
    <div class="c-tl">Subtopics</div>
    <div class="chips" id="pchips"></div>
  </div>
</div>

<div id="legend">
  <div class="lg-t">Priority</div>
  <div class="lg-r"><div class="lg-d" style="background:#e07070"></div>Exam critical</div>
  <div class="lg-r"><div class="lg-d" style="background:#a585e0"></div>New study</div>
  <div class="lg-r"><div class="lg-d" style="background:#d4943a"></div>Quick review</div>
  <div class="lg-r"><div class="lg-d" style="background:#5aab80"></div>Skip</div>
  <div style="height:1px;background:var(--border);margin:4px 0;"></div>
  <div class="lg-r"><div class="lg-d" style="background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.4)"></div>Has hidden children</div>
</div>

<script>

var PL={exam:"Exam — critical",new:"New — study carefully",review:"Quick review",skip:"Skip / out of scope"};
var PC={exam:"be",new:"bn",review:"br",skip:"bs"};

/* ── Tree data ── */
var RAW={id:"root",label:"Databricks",type:"root",color:"#4f8ef7",section:"Root",desc:"Databricks Data Intelligence Platform — unified data, analytics, and AI on the Lakehouse.",
children:[
  {id:"intro",label:"What is\nDatabricks?",type:"top",color:"#4f8ef7",path:"/introduction/",priority:"exam",section:"Root",desc:"Unified, open analytics platform. Covers the Lakehouse concept, data intelligence, and main product pillars.",
   children:[
     {id:"intro-lh",label:"What is a\nLakehouse?",type:"leaf",color:"#4f8ef7",path:"/lakehouse/",priority:"exam",section:"What is Databricks?",desc:"Lakehouse = data warehouse + data lake. ACID transactions, schema enforcement, BI support, and open Delta format in one platform."},
     {id:"intro-comp",label:"Databricks\nComponents",type:"leaf",color:"#4f8ef7",path:"/getting-started/concepts",priority:"exam",section:"What is Databricks?",desc:"Workspaces, all-purpose vs job clusters, notebooks, Databricks Runtime, REPL environments (Python/Scala/SQL/R), DBFS, and identity concepts."},
     {id:"intro-uc",label:"Unity Catalog\nOverview",type:"leaf",color:"#4f8ef7",path:"/data-governance/unity-catalog/",priority:"new",section:"What is Databricks?",desc:"Unity Catalog: three-level namespace (catalog.schema.table), unified access control, data lineage, discovery, and auditing across workspaces."}
   ]},
  {id:"gs",label:"Get\nStarted",type:"section",color:"#1db87a",
   children:[
     {id:"signup",label:"Sign Up",type:"leaf",color:"#1db87a",path:"/getting-started/free-trial-vs-free-edition",priority:"skip",section:"Get started",desc:"Free trial vs. free edition. Choose cloud provider and provision first workspace. Not exam-relevant."},
     {id:"tutorials",label:"Tutorials",type:"mid",color:"#1db87a",path:"/getting-started/",priority:"review",section:"Get started",desc:"Guided tutorials for data pipelines, SQL, ML, and notebooks.",
      children:[
        {id:"tut-df",label:"DataFrame\nTutorial",type:"leaf",color:"#1db87a",path:"/getting-started/dataframes",priority:"exam",section:"Tutorials",desc:"Load and transform data using Apache Spark DataFrames. Covers read, write, display() vs show(), and common DataFrame operations."},
        {id:"tut-delta",label:"Delta Lake\nTutorial",type:"leaf",color:"#1db87a",path:"/getting-started/delta",priority:"exam",section:"Tutorials",desc:"Create and manage Delta tables: CREATE TABLE, INSERT, UPDATE, DELETE, MERGE INTO, time travel, DESCRIBE HISTORY."},
        {id:"tut-etl",label:"ETL / CDC\nTutorial",type:"leaf",color:"#1db87a",path:"/getting-started/etl-simple",priority:"review",section:"Tutorials",desc:"ETL pipeline using CDC. Covers Auto Loader, MERGE INTO, and Bronze/Silver medallion architecture."}
      ]},
     {id:"wsui",label:"Workspace\nUI",type:"mid",color:"#1db87a",path:"/workspace/",priority:"review",section:"Get started",desc:"Workspace UI: sidebar navigation, Catalog Explorer, search, settings.",
      children:[
        {id:"wsui-nav",label:"Navigate\nWorkspace",type:"leaf",color:"#1db87a",path:"/workspace/workspace-nav",priority:"review",section:"Workspace UI",desc:"Navigate sidebar: Catalog, Workflows, Compute, Data, Settings, Search. Workspace vs account-level navigation."},
        {id:"wsui-files",label:"Work with\nFiles",type:"leaf",color:"#1db87a",path:"/files/",priority:"review",section:"Workspace UI",desc:"DBFS, Volumes, workspace files, and Unity Catalog storage. Upload, download, and manage files."}
      ]},
     {id:"data-guides",label:"Data\nGuides",type:"leaf",color:"#1db87a",path:"/guides/",priority:"review",section:"Get started",desc:"Practical data guides: format comparisons, ingestion patterns, query optimization, and serving data."}
   ]},
  {id:"dm",label:"Data\nManagement",type:"section",color:"#7c5cbf",
   children:[
     {id:"de",label:"Data\nEngineering",type:"mid",color:"#7c5cbf",path:"/data-engineering/",priority:"exam",section:"Data Management",desc:"Core data engineering on Databricks: pipelines, streaming, batch, CDC, schema evolution, and orchestration.",
      children:[
        {id:"de-concepts",label:"Concepts",type:"mid",color:"#7c5cbf",path:"/data-engineering/concepts",priority:"exam",section:"Data Engineering",desc:"Foundational concepts: procedural vs declarative, schema evolution, CDC, streaming vs batch, tables and views.",
         children:[
           {id:"de-proc",label:"Procedural vs\nDeclarative",type:"leaf",color:"#7c5cbf",path:"/data-engineering/procedural-vs-declarative",priority:"exam",section:"Concepts",desc:"Procedural = step-by-step imperative (PySpark/Scala). Declarative = describe the result (SQL, DLT). Key exam concept."},
           {id:"de-schema",label:"Schema\nEvolution",type:"leaf",color:"#7c5cbf",path:"/data-engineering/schema-evolution",priority:"exam",section:"Concepts",desc:"Schema evolution across Auto Loader, Delta, and Structured Streaming. Options: mergeSchema, overwriteSchema, column mapping, type widening."},
           {id:"de-cdc",label:"Change Data\nCapture",type:"leaf",color:"#7c5cbf",path:"/data-engineering/what-is-change-data-capture",priority:"exam",section:"Concepts",desc:"CDC: change feeds vs snapshots, SCD Type 1 (overwrite) vs SCD Type 2 (full history with __START_AT/__END_AT)."},
           {id:"de-tblviews",label:"Tables &\nViews",type:"leaf",color:"#7c5cbf",path:"/data-engineering/tables-views",priority:"exam",section:"Concepts",desc:"Tables vs views vs materialized views vs streaming tables. Managed vs external. Batch vs streaming semantics."},
           {id:"de-batchstream",label:"Batch vs\nStreaming",type:"leaf",color:"#7c5cbf",path:"/structured-streaming/concepts",priority:"exam",section:"Concepts",desc:"When to use batch vs streaming. Latency, cost, and complexity tradeoffs. Structured Streaming integrates with Delta Lake."}
         ]},
        {id:"de-lfc",label:"Lakeflow\nConnect",type:"mid",color:"#7c5cbf",path:"/ingestion/overview",priority:"review",section:"Data Engineering",desc:"Managed connectors for ingesting from SaaS apps, databases, message buses, and cloud storage.",
         children:[
           {id:"de-autoloader",label:"Auto Loader\ncloudFiles",type:"leaf",color:"#7c5cbf",path:"/ingestion/cloud-object-storage/auto-loader/",priority:"exam",section:"Lakeflow Connect",desc:"Auto Loader (cloudFiles) incrementally ingests new files from cloud storage. Schema inference, evolution, rescue data, and directory listing."},
           {id:"de-kafka",label:"Kafka\nIntegration",type:"leaf",color:"#7c5cbf",path:"/structured-streaming/kafka",priority:"review",section:"Lakeflow Connect",desc:"Read from and write to Apache Kafka topics using Structured Streaming. Subscribe topics, set starting offsets, handle backpressure."}
         ]},
        {id:"de-ldp",label:"Declarative\nPipelines",type:"mid",color:"#7c5cbf",path:"/ldp/",priority:"review",section:"Data Engineering",desc:"Lakeflow Spark Declarative Pipelines (DLT): declarative ETL with automatic error handling, autoscaling, and lineage.",
         children:[
           {id:"de-ldp-cdc",label:"CDC in\nPipelines",type:"leaf",color:"#7c5cbf",path:"/ldp/what-is-change-data-capture",priority:"review",section:"Declarative Pipelines",desc:"APPLY CHANGES INTO simplifies SCD1 and SCD2 without writing custom MERGE logic or staging tables."},
           {id:"de-ldp-compute",label:"Pipeline\nCompute",type:"leaf",color:"#7c5cbf",path:"/ldp/configure-compute",priority:"review",section:"Declarative Pipelines",desc:"Classic vs serverless compute for pipelines. Update cluster vs maintenance cluster. Labels: default, updates, maintenance."}
         ]},
        {id:"de-jobs",label:"Lakeflow\nJobs",type:"mid",color:"#7c5cbf",path:"/jobs/",priority:"exam",section:"Data Engineering",desc:"Databricks Jobs: multi-task workflows, task dependencies, scheduling, retries, and repair runs.",
         children:[
           {id:"de-jobs-create",label:"Create &\nSchedule",type:"leaf",color:"#7c5cbf",path:"/jobs/create-run-jobs",priority:"exam",section:"Lakeflow Jobs",desc:"Create jobs with notebook, Python script, JAR, SQL, or DLT pipeline tasks. CRON schedules, trigger conditions, task dependency DAGs."},
           {id:"de-jobs-repair",label:"Repair &\nRetry",type:"leaf",color:"#7c5cbf",path:"/jobs/repair-job-failures",priority:"review",section:"Lakeflow Jobs",desc:"Repair failed runs by re-running only failed and downstream tasks. Configure max retries and retry interval per task."},
           {id:"de-jobs-params",label:"Job\nParameters",type:"leaf",color:"#7c5cbf",path:"/jobs/settings",priority:"review",section:"Lakeflow Jobs",desc:"Pass parameters via task values, job parameters, widgets, and dynamic value references between tasks."}
         ]},
        {id:"de-bp",label:"Best\nPractices",type:"mid",color:"#7c5cbf",path:"/data-engineering/best-practices",priority:"exam",section:"Data Engineering",desc:"Engineering best practices: table optimization, pipeline design, cost control, and performance tuning.",
         children:[
           {id:"de-bp-prod",label:"Production\nStreaming",type:"leaf",color:"#7c5cbf",path:"/structured-streaming/production",priority:"exam",section:"Best Practices",desc:"Production streaming: use job clusters, continuous trigger, avoid display(), use checkpoint locations, scheduler pools for multiple queries."},
           {id:"de-bp-optim",label:"Table\nOptimization",type:"leaf",color:"#7c5cbf",path:"/delta/optimization/",priority:"exam",section:"Best Practices",desc:"OPTIMIZE (file compaction), Z-ORDER BY (multi-dimensional clustering), VACUUM (remove old files), Bloom filters, data skipping with statistics."}
         ]}
      ]},
     {id:"dw",label:"Data\nWarehousing",type:"mid",color:"#7c5cbf",path:"/sql/",priority:"review",section:"Data Management",desc:"SQL warehouses, serverless compute, and Spark SQL. Context for exam SQL questions.",
      children:[
        {id:"dw-sql",label:"Spark SQL\nLanguage",type:"leaf",color:"#7c5cbf",path:"/sql/language-manual/",priority:"exam",section:"Data Warehousing",desc:"Full Spark SQL manual: DDL, DML, SELECT, JOINs, window functions (OVER PARTITION BY ORDER BY), CTEs, LATERAL VIEW EXPLODE, QUALIFY, MERGE INTO."},
        {id:"dw-warehouse",label:"SQL\nWarehouses",type:"leaf",color:"#7c5cbf",path:"/sql/admin/sql-warehouses",priority:"review",section:"Data Warehousing",desc:"SQL warehouses vs all-purpose clusters. Serverless vs classic. Scaling options, auto-stop, and spot instance support."}
      ]},
     {id:"tables",label:"Tables",type:"mid",color:"#7c5cbf",path:"/tables/",priority:"review",section:"Data Management",desc:"Managed vs external tables, Delta Lake format, partitioning, Hive metastore vs Unity Catalog.",
      children:[
        {id:"tables-managed",label:"Managed vs\nExternal",type:"leaf",color:"#7c5cbf",path:"/tables/tables",priority:"exam",section:"Tables",desc:"Managed: Databricks controls lifecycle, always Delta, stored in UC managed storage. External: you own the files, multiple formats."},
        {id:"tables-part",label:"Partitioning\nStrategy",type:"leaf",color:"#7c5cbf",path:"/tables/partitions",priority:"exam",section:"Tables",desc:"Partition by low-cardinality columns. Avoid over-partitioning (small files problem). Delta data skipping often replaces explicit partitions."},
        {id:"tables-delta",label:"Delta Lake\nInternals",type:"leaf",color:"#7c5cbf",path:"/delta/",priority:"exam",section:"Tables",desc:"Delta Lake: ACID transactions via _delta_log, scalable metadata, time travel (VERSION AS OF), schema enforcement, unified batch/streaming."}
      ]},
     {id:"sharing",label:"Data\nSharing",type:"leaf",color:"#7c5cbf",path:"/data-sharing/",priority:"skip",section:"Data Management",desc:"Delta Sharing: open protocol for sharing live data across organizations without copying. Not exam-relevant."},
     {id:"oltp",label:"OLTP\nLakebase",type:"leaf",color:"#7c5cbf",path:"/oltp/",priority:"skip",section:"Data Management",desc:"Lakebase: managed PostgreSQL-compatible OLTP database integrated with Databricks. Not exam-relevant."}
   ]},
  {id:"ai",label:"AI &\nAnalytics",type:"section",color:"#e0633a",
   children:[
     {id:"genie",label:"Genie\nCode",type:"leaf",color:"#e0633a",path:"/genie-code/",priority:"skip",section:"AI & Analytics",desc:"AI-powered code generation assistant inside Databricks. Not covered in Associate exam."},
     {id:"ml",label:"AI & Machine\nLearning",type:"mid",color:"#e0633a",path:"/machine-learning/",priority:"skip",section:"AI & Analytics",desc:"MLflow tracking, Feature Store, model serving, AutoML. Out of scope for Associate developer exam.",
      children:[
        {id:"ml-mlflow",label:"MLflow\nTracking",type:"leaf",color:"#e0633a",path:"/mlflow/",priority:"skip",section:"AI & ML",desc:"MLflow experiment tracking, model registry, deployment. Not exam-relevant."},
        {id:"ml-automl",label:"AutoML",type:"leaf",color:"#e0633a",path:"/machine-learning/automl",priority:"skip",section:"AI & ML",desc:"Automated ML for classification, regression, forecasting. Not exam-relevant."}
      ]},
     {id:"bi",label:"Business\nIntelligence",type:"leaf",color:"#e0633a",path:"/ai-bi/",priority:"skip",section:"AI & Analytics",desc:"Databricks dashboards and Lakeview reporting. Out of scope for Associate exam."}
   ]},
  {id:"plat",label:"Platform",type:"section",color:"#4f8ef7",
   children:[
     {id:"arch",label:"Architecture",type:"mid",color:"#4f8ef7",path:"/getting-started/architecture",priority:"exam",section:"Platform",desc:"Platform architecture: control plane vs data plane, DBFS, cloud storage, and networking.",
      children:[
        {id:"arch-planes",label:"Control vs\nData Plane",type:"leaf",color:"#4f8ef7",path:"/getting-started/architecture",priority:"exam",section:"Architecture",desc:"Control plane (Databricks-managed): web app, jobs, cluster manager, UC. Data plane (your cloud): Spark compute, storage, network."},
        {id:"arch-dbfs",label:"DBFS &\nVolumes",type:"leaf",color:"#4f8ef7",path:"/dbfs/",priority:"review",section:"Architecture",desc:"DBFS: abstraction over cloud storage (deprecated pattern). Unity Catalog Volumes are now preferred for governed file storage."},
        {id:"arch-net",label:"Networking",type:"leaf",color:"#4f8ef7",path:"/security/network/",priority:"skip",section:"Architecture",desc:"VPC peering, private link, IP access lists. Admin/security topic, not exam-relevant for developers."}
      ]},
     {id:"compute",label:"Compute",type:"mid",color:"#4f8ef7",path:"/compute/",priority:"exam",section:"Platform",desc:"Cluster configuration, types, Databricks Runtime, auto-scaling, serverless, and pools.",
      children:[
        {id:"comp-create",label:"Create &\nConfigure",type:"leaf",color:"#4f8ef7",path:"/compute/configure",priority:"exam",section:"Compute",desc:"Cluster settings: DBR version, node type, worker count, auto-scaling, auto-termination, Spark config, init scripts, access mode."},
        {id:"comp-types",label:"Cluster\nTypes",type:"leaf",color:"#4f8ef7",path:"/compute/cluster-types",priority:"exam",section:"Compute",desc:"All-purpose (interactive, shared, manually managed) vs job clusters (automated, created/terminated per run). Single-node for ML."},
        {id:"comp-manage",label:"Manage\nClusters",type:"leaf",color:"#4f8ef7",path:"/compute/clusters-manage",priority:"review",section:"Compute",desc:"Start, terminate, pin, clone clusters. Event log, driver logs, Spark UI, and metrics. 30-day retention for terminated clusters."},
        {id:"comp-dbr",label:"Databricks\nRuntime",type:"leaf",color:"#4f8ef7",path:"/release-notes/runtime/",priority:"exam",section:"Compute",desc:"DBR = Spark + Delta + libraries. Standard DBR, DBR ML, DBR Genomics. LTS releases (2+ year support). Photon for vectorized execution."},
        {id:"comp-serverless",label:"Serverless\nCompute",type:"leaf",color:"#4f8ef7",path:"/compute/serverless",priority:"review",section:"Compute",desc:"Serverless for notebooks, jobs, and pipelines. No cluster config — instantly available, auto-scales, fully managed."},

        {id:"comp-policy",label:"Cluster\nPolicies",type:"leaf",color:"#4f8ef7",path:"/admin/clusters/policies",priority:"review",section:"Compute",desc:"Cluster policies limit configuration options. Fixed policies enforce values; limiting policies restrict choices."},
        {id:"comp-photon",label:"Photon\nEngine",type:"leaf",color:"#4f8ef7",path:"/compute/photon",priority:"review",section:"Compute",desc:"Photon: native vectorized execution engine. Accelerates SQL and DataFrame ops — joins, aggregations, large scans."},

/* ── Collapse/expand helpers ── */
function setCollapsed(node, collapsed){
  if(!node.children && !node._children) return;
  if(collapsed){
    if(node.children){ node._children=node.children; node.children=null; }
  } else {
    if(node._children){ node.children=node._children; node._children=null; }
  }
}

/* Build the d3 hierarchy, initially collapse everything except root and sections */
function prepareTree(raw, depth){
  depth = depth||0;
  var node = Object.assign({}, raw);
  node._rawChildren = raw.children ? raw.children.map(function(c){ return prepareTree(c, depth+1); }) : null;
  node.children = null;
  node._children = null;
  /* root and sections start expanded; everything else collapsed */
  if(node._rawChildren){
    if(depth<=1){ node.children = node._rawChildren; }
    else { node._children = node._rawChildren; }
  }
  return node;
}

var root = prepareTree(RAW, 0);

/* ── D3 setup ── */
var SZ={root:26,section:18,mid:12,top:12,leaf:8};
var w=window.innerWidth, h=window.innerHeight;
var svg=d3.select("body").append("svg").attr("width",w).attr("height",h);
var g=svg.append("g");

var zoom=d3.zoom().scaleExtent([0.1,4]).on("zoom",function(e){ g.attr("transform",e.transform); });
svg.call(zoom);

var linkG = g.append("g").attr("class","links");
var nodeG = g.append("g").attr("class","nodes");

var simulation = d3.forceSimulation()
  .force("link", d3.forceLink().id(function(d){ return d.id; }).strength(0.5))
  .force("charge", d3.forceManyBody().strength(function(d){ return chargeStr(d); }))
  .force("center", d3.forceCenter(w/2, h/2).strength(0.05))
  .force("collide", d3.forceCollide().radius(function(d){ return (SZ[d.type]||8)+22; }).strength(0.75));

function chargeStr(d){
  if(d.type==="root") return -1400;
  if(d.type==="section") return -600;
  if(d.type==="mid"||d.type==="top") return -320;
  return -160;
}
function linkDist(d){
  var st = d.source.type||"leaf";
  if(st==="root") return 220;
  if(st==="section") return 165;
  if(st==="mid"||st==="top") return 120;
  return 90;
}

/* ── Flatten visible nodes and links ── */
function flatten(node, nodes, links){
  nodes.push(node);
  if(node.children){
    node.children.forEach(function(child){
      links.push({source:node.id, target:child.id, srcType:node.type});
      flatten(child, nodes, links);
    });
  }
}

/* ── Main update function ── */
function update(){
  var nodes=[], links=[];
  flatten(root, nodes, links);

  /* Preserve positions */
  var old={};
  nodeG.selectAll("g.node-grp").each(function(d){ old[d.id]={x:d.x,y:d.y}; });
  nodes.forEach(function(n){
    if(old[n.id]){ n.x=old[n.id].x; n.y=old[n.id].y; }
    else if(!n.x){ n.x=w/2+(Math.random()-0.5)*200; n.y=h/2+(Math.random()-0.5)*200; }
  });

  /* Links */
  var linkSel = linkG.selectAll("line").data(links, function(d){ return d.source+"-"+d.target; });
  linkSel.exit().remove();
  var linkEnter = linkSel.enter().append("line")
    .style("opacity",0)
    .style("stroke",function(d){
      var sn=nodes.find(function(n){ return n.id===d.source; });
      return sn ? sn.color+"22" : "rgba(255,255,255,0.06)";
    })
    .style("stroke-width",function(d){
      if(d.srcType==="root") return 1.5;
      if(d.srcType==="section") return 1.2;
      return 0.8;
    })
    .style("stroke-dasharray",function(d){
      return (d.srcType==="leaf")?"3 3":"none";
    })
    .style("fill","none");
  linkEnter.transition().duration(300).style("opacity",1);
  var allLinks = linkEnter.merge(linkSel);

  /* Nodes */
  var nodeSel = nodeG.selectAll("g.node-grp").data(nodes, function(d){ return d.id; });
  nodeSel.exit().transition().duration(200).style("opacity",0).remove();

  var nodeEnter = nodeSel.enter().append("g")
    .attr("class","node-grp")
    .style("cursor","pointer")
    .style("opacity",0)
    .attr("transform",function(d){ return "translate("+(d.x||w/2)+","+(d.y||h/2)+")"; })
    .call(d3.drag()
      .on("start",function(e,d){ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",function(e,d){ d.fx=e.x; d.fy=e.y; })
      .on("end",function(e,d){ if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  nodeEnter.transition().duration(300).style("opacity",1);

  /* Circle */
  nodeEnter.append("circle")
    .attr("class","node-circle")
    .attr("r",function(d){ return SZ[d.type]||8; })
    .style("fill",function(d){ return d.color+(d.type==="root"?"2a":"15"); })
    .style("stroke",function(d){ return d.color; })
    .style("stroke-width",function(d){ return d.type==="root"?2.5:d.type==="section"?1.8:1.2; });

  /* Collapse indicator ring */
  nodeEnter.append("circle")
    .attr("class","collapse-ring")
    .attr("r",function(d){ return (SZ[d.type]||8)+4; })
    .style("fill","none")
    .style("stroke","rgba(255,255,255,0.18)")
    .style("stroke-width","1")
    .style("stroke-dasharray","2 3")
    .style("display",function(d){ return (d._children&&d._children.length)?"block":"none"; });

  /* +/− expand badge */
  nodeEnter.each(function(d){
    var hasKids = (d.children&&d.children.length)||(d._children&&d._children.length);
    if(!hasKids || d.type==="root") return;
    var r = SZ[d.type]||8;
    d3.select(this).append("circle")
      .attr("class","badge-bg")
      .attr("cx", r-3).attr("cy", -r+3)
      .attr("r", 5)
      .style("fill", d.color)
      .style("stroke","var(--bg)")
      .style("stroke-width","1.5");
    d3.select(this).append("text")
      .attr("class","expand-badge")
      .attr("x", r-3).attr("y", -r+3)
      .attr("text-anchor","middle")
      .attr("dominant-baseline","central")
      .style("fill","#fff")
      .text(d._children ? "+" : "−");
  });

  /* Label */
  nodeEnter.each(function(d){
    var r=SZ[d.type]||8;
    var lines=d.label.split("\n");
    var el=d3.select(this).append("text")
      .attr("class","node-label")
      .attr("text-anchor","middle")
      .style("fill",function(){ return d.type==="root"?"#e2e4ee":d.type==="section"?"#c8ccdc":d.type==="mid"||d.type==="top"?"#9098b4":"#6a7090"; })
      .style("font-size",d.type==="root"?"11px":d.type==="section"?"9.5px":"8.5px")
      .style("font-weight",(d.type==="root"||d.type==="section")?"500":"400")
      .style("pointer-events","none");
    if(lines.length===1){
      el.attr("dy",r+12).text(d.label);
    } else {
      el.attr("dy",r+10);
      lines.forEach(function(ln,i){ el.append("tspan").attr("x",0).attr("dy",i===0?0:"1.1em").text(ln); });
    }
  });

  /* Click = panel, dblclick = toggle */
  var allNodes = nodeEnter.merge(nodeSel);

  /* update collapse ring visibility on merged nodes too */
  allNodes.select(".collapse-ring")
    .style("display",function(d){ return (d._children&&d._children.length)?"block":"none"; });

  /* update +/− badge text on merged nodes */
  allNodes.select(".expand-badge")
    .text(function(d){ return d._children ? "+" : "−"; });

  /* update badge-bg visibility */
  allNodes.select(".badge-bg")
    .style("display",function(d){
      var hasKids = (d.children&&d.children.length)||(d._children&&d._children.length);
      return (hasKids && d.type!=="root") ? "block" : "none";
    });

  /* Single click: show info panel */
  allNodes.on("click", function(e, d){
    e.stopPropagation();
    showPanel(d);
  });

  /* Double click: toggle expand/collapse */
  allNodes.on("dblclick", function(e, d){
    e.stopPropagation();
    /* pulse ring */
    var grp = d3.select(this);
    grp.append("circle")
      .attr("class","pulse-circle")
      .attr("r", SZ[d.type]||8)
      .style("fill","none")
      .style("stroke", d.color)
      .style("stroke-width","1.5")
      .style("pointer-events","none")
      .transition().duration(450).remove();
    toggle(d);
    update();
    simulation.alpha(0.4).restart();
  });

  /* Hover highlight */
  allNodes
    .on("mouseenter", function(e,d){
      d3.select(this).select(".node-circle")
        .style("fill", d.color+"45")
        .style("stroke-width", (SZ[d.type]||8)>10 ? 2.8 : 2);
    })
    .on("mouseleave", function(e,d){
      if(d.id !== activeId){
        d3.select(this).select(".node-circle")
          .style("fill", d.color+(d.type==="root"?"2a":"15"))
          .style("stroke-width", d.type==="root"?2.5:d.type==="section"?1.8:1.2);
      }
    });

  /* Simulation */
  simulation.nodes(nodes).on("tick", function(){
    allLinks
      .attr("x1",function(d){ return d.source.x; })
      .attr("y1",function(d){ return d.source.y; })
      .attr("x2",function(d){ return d.target.x; })
      .attr("y2",function(d){ return d.target.y; });
    allNodes.attr("transform",function(d){ return "translate("+d.x+","+d.y+")"; });
  });
  simulation.force("link").links(links).distance(linkDist);
}

function toggle(d){
  if(d.children){
    d._children = d.children;
    d.children = null;
  } else if(d._children){
    d.children = d._children;
    d._children = null;
  }
}

function expandAll(){
  function exp(n){
    if(n._children){ n.children=n._children; n._children=null; }
    if(n.children) n.children.forEach(exp);
  }
  exp(root);
  update();
  simulation.alpha(0.5).restart();
}

function collapseAll(){
  function col(n, depth){
    depth=depth||0;
    if(n.children && depth>0){ n._children=n.children; n.children=null; }
    if(n.children) n.children.forEach(function(c){ col(c, depth+1); });
    if(n._children) n._children.forEach(function(c){ col(c, depth+1); });
  }
  col(root, 0);
  update();
  simulation.alpha(0.5).restart();
}

function resetZoom(){
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(w/2,h/2).scale(1).translate(-w/2,-h/2));
}

/* ── Panel ── */
var activeId = null;
var B="https://docs.databricks.com/aws/en";

function showPanel(d){
  activeId = d.id;
  var prio=d.priority||"review";
  document.getElementById("ph").textContent=d.section||"Databricks";
  document.getElementById("pt").textContent=d.label.replace(/\n/,' ');
  document.getElementById("pp").textContent=d.parentId ? "parent: "+d.parentId : "";
  var pb=document.getElementById("pb");
  pb.textContent=PL[prio]||"Review";
  pb.className="p-badge "+(PC[prio]||"br");
  document.getElementById("pd").textContent=d.desc||d.label.replace(/\n/,' ');
  var btn=document.getElementById("pbtn");
  if(d.path){ btn.href=B+d.path; btn.style.display="inline-flex"; }
  else { btn.style.display="none"; }

  /* Child chips (both visible and hidden children) */
  var cw=document.getElementById("pch");
  var ce=document.getElementById("pchips");
  var allKids = (d.children||[]).concat(d._children||[]);
  if(allKids.length){
    ce.innerHTML="";
    allKids.forEach(function(c){
      var ch=document.createElement("span");
      ch.className="chip";
      ch.textContent=c.label.replace(/\n/,' ');
      /* clicking a chip expands parent if needed, then shows panel for child */
      ch.onclick=function(){
        if(!d.children){ toggle(d); update(); simulation.alpha(0.3).restart(); }
        setTimeout(function(){ showPanel(c); }, 50);
      };
      ce.appendChild(ch);
    });
    cw.style.display="block";
  } else {
    cw.style.display="none";
  }

  document.getElementById("panel").classList.add("vis");

  /* Pulse active node */
  nodeG.selectAll("g.node-grp").select(".node-circle")
    .style("fill",function(n){ return n.id===d.id ? n.color+"55" : n.color+(n.type==="root"?"2a":"15"); })
    .style("stroke-width",function(n){ return n.id===d.id ? 3.5 : (n.type==="root"?2.5:n.type==="section"?1.8:1.2); });
}

function closePanel(){
  document.getElementById("panel").classList.remove("vis");
  activeId=null;
  nodeG.selectAll("g.node-grp").select(".node-circle")
    .style("fill",function(d){ return d.color+(d.type==="root"?"2a":"15"); })
    .style("stroke-width",function(d){ return d.type==="root"?2.5:d.type==="section"?1.8:1.2; });
}

svg.on("click", closePanel);
document.getElementById("pcl").onclick=function(e){ e.stopPropagation(); closePanel(); };

/* ── Boot ── */
update();
simulation.alpha(1).restart();

/* Fade hint */
setTimeout(function(){
  var hint=document.getElementById("hint");
  if(hint){ hint.style.opacity="0"; setTimeout(function(){ if(hint.parentNode) hint.parentNode.removeChild(hint); },500); }
},6000);

window.addEventListener("resize",function(){
  w=window.innerWidth; h=window.innerHeight;
  svg.attr("width",w).attr("height",h);
  simulation.force("center",d3.forceCenter(w/2,h/2).strength(0.05)).alpha(0.2).restart();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCP Mind Map — Google Cloud Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #131720;
    --bg3: #1a1f2e;
    --bg4: #202535;
    --surface: #252b3b;
    --border: #2e3548;
    --border2: #3a4260;
    --text: #e8eaf0;
    --text2: #9ba3be;
    --text3: #6b7494;
    --gcp-blue: #4285F4;
    --gcp-red: #EA4335;
    --gcp-yellow: #FBBC04;
    --gcp-green: #34A853;
    --accent: #4285F4;

    /* Section colors */
    --c1: #4285F4; /* Compute */
    --c2: #34A853; /* Storage */
    --c3: #EA4335; /* Networking */
    --c4: #FBBC04; /* Databases */
    --c5: #AB47BC; /* AI & ML */
    --c6: #00BCD4; /* Big Data */
    --c7: #FF7043; /* Security */
    --c8: #26A69A; /* DevOps */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(13,15,20,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .gcp-badge {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .gcp-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .header-title {
    font-family: 'IBM Plex Sans Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    margin-left: 4px;
  }

  .header-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 6px;
    margin-left: auto;
    align-items: center;
  }

  .tb-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .tb-btn:hover {
    background: var(--bg4);
    border-color: var(--border2);
    color: var(--text);
  }
  .tb-btn.primary {
    background: rgba(66,133,244,0.15);
    border-color: rgba(66,133,244,0.4);
    color: var(--gcp-blue);
  }
  .tb-btn.primary:hover {
    background: rgba(66,133,244,0.25);
  }

  /* Stats */
  .stat-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gcp-green); animation: pulse-dot 2s infinite; }

  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Canvas */
  #canvas {
    position: fixed;
    top: 56px; left: 0;
    width: 100%; height: calc(100vh - 56px);
  }

  svg { width: 100%; height: 100%; }

  /* Links */
  .link {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.35;
    stroke-linecap: round;
  }

  /* Nodes */
  .node { cursor: pointer; }

  .node circle {
    transition: r 0.3s cubic-bezier(0.34,1.56,0.64,1),
                filter 0.2s,
                stroke-width 0.2s;
  }
  .node:hover circle { filter: brightness(1.25); }
  .node.selected circle { stroke-width: 3 !important; filter: brightness(1.3); }

  .node text {
    pointer-events: none;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  /* Pulse animation */
  @keyframes pulse-ring {
    0% { r: 0; opacity: 0.6; }
    100% { r: 40; opacity: 0; }
  }
  .pulse-ring { animation: pulse-ring 0.6s ease-out forwards; }

  /* Badge +/- */
  .node .expand-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    pointer-events: none;
  }

  /* Info Panel */
  #info-panel {
    position: fixed;
    top: 72px;
    right: 16px;
    width: 320px;
    background: rgba(19,23,32,0.97);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    z-index: 200;
    backdrop-filter: blur(16px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    transform: translateX(calc(100% + 24px));
    transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
  }
  #info-panel.visible { transform: translateX(0); }

  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .panel-level {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .panel-name {
    font-family: 'IBM Plex Sans Condensed', sans-serif;
    font-size: 19px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .panel-parent {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .panel-parent span { color: var(--text2); }

  .panel-close {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--bg4);
    border: 1px solid var(--border);
    color: var(--text3);
    width: 24px; height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .panel-close:hover { color: var(--text); background: var(--surface); }

  .panel-body { padding: 14px 18px; }

  .priority-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .priority-badge.exam-critical { background: rgba(234,67,53,0.15); color: #EA4335; border: 1px solid rgba(234,67,53,0.3); }
  .priority-badge.new-study { background: rgba(66,133,244,0.15); color: #4285F4; border: 1px solid rgba(66,133,244,0.3); }
  .priority-badge.quick-review { background: rgba(251,188,4,0.12); color: #FBBC04; border: 1px solid rgba(251,188,4,0.3); }
  .priority-badge.skip { background: rgba(107,116,148,0.15); color: var(--text3); border: 1px solid var(--border); }

  .panel-desc {
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .panel-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .subtopic-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .chip {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10.5px;
    color: var(--text2);
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
    cursor: default;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }

  .doc-link {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    text-decoration: none;
    color: var(--text2);
    font-size: 11.5px;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .doc-link:hover {
    border-color: var(--border2);
    color: var(--text);
    background: var(--surface);
  }
  .doc-link svg { flex-shrink: 0; opacity: 0.6; }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(19,23,32,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .legend-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 9px;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10.5px;
    color: var(--text2);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Priority legend */
  #priority-legend {
    position: fixed;
    bottom: 16px;
    left: 210px;
    background: rgba(19,23,32,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  /* Help hint */
  #hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: rgba(19,23,32,0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 13px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    z-index: 100;
    line-height: 1.7;
  }

  .hint-key {
    display: inline-block;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--text2);
    font-size: 9px;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="header-logo">
    <div class="gcp-badge">
      <div class="gcp-dot" style="background:#4285F4"></div>
      <div class="gcp-dot" style="background:#EA4335"></div>
      <div class="gcp-dot" style="background:#FBBC04"></div>
      <div class="gcp-dot" style="background:#34A853"></div>
    </div>
    <div>
      <div class="header-title">Google Cloud Platform</div>
    </div>
    <span class="header-sub">/ mind map</span>
  </div>
  <div class="header-divider"></div>
  <div class="stat-chip">
    <div class="stat-dot"></div>
    <span id="node-count">0</span> nodes
  </div>
  <div class="toolbar">
    <button class="tb-btn" onclick="expandAll()">Expand All</button>
    <button class="tb-btn" onclick="collapseAll()">Collapse All</button>
    <button class="tb-btn primary" onclick="resetView()">Reset View</button>
  </div>
</div>

<!-- Canvas -->
<div id="canvas">
  <svg id="svg">
    <defs>
      <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>
</div>

<!-- Info Panel -->
<div id="info-panel">
  <div class="panel-header">
    <div class="panel-level" id="panel-level"></div>
    <div class="panel-name" id="panel-name"></div>
    <div class="panel-parent" id="panel-parent"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div id="panel-priority"></div>
    <div class="panel-desc" id="panel-desc"></div>
    <div id="panel-subtopics-section">
      <div class="panel-section-label">Subtopics</div>
      <div class="subtopic-chips" id="panel-chips"></div>
    </div>
    <div class="panel-section-label">Documentation</div>
    <a id="panel-doc-link" href="#" target="_blank" class="doc-link" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span id="panel-doc-text">View GCP Documentation</span>
    </a>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-title">Service Categories</div>
  <div class="legend-grid" id="legend-grid"></div>
</div>

<!-- Priority Legend -->
<div id="priority-legend">
  <div class="legend-title">Priority</div>
  <div style="display:flex;flex-direction:column;gap:5px;">
    <div class="legend-item"><span style="width:8px;height:8px;border-radius:2px;background:#EA4335;display:inline-block;flex-shrink:0"></span><span style="font-size:10.5px;color:var(--text2)">Exam Critical</span></div>
    <div class="legend-item"><span style="width:8px;height:8px;border-radius:2px;background:#4285F4;display:inline-block;flex-shrink:0"></span><span style="font-size:10.5px;color:var(--text2)">New Study</span></div>
    <div class="legend-item"><span style="width:8px;height:8px;border-radius:2px;background:#FBBC04;display:inline-block;flex-shrink:0"></span><span style="font-size:10.5px;color:var(--text2)">Quick Review</span></div>
    <div class="legend-item"><span style="width:8px;height:8px;border-radius:2px;background:#6b7494;display:inline-block;flex-shrink:0"></span><span style="font-size:10.5px;color:var(--text2)">Skip</span></div>
  </div>
</div>

<!-- Hint -->
<div id="hint">
  <span class="hint-key">click</span> info panel &nbsp;·&nbsp; <span class="hint-key">dbl</span> expand/collapse<br>
  <span class="hint-key">drag</span> pan &nbsp;·&nbsp; <span class="hint-key">scroll</span> zoom
</div>

// =============================================
// COLOR MAP & LEGEND
// =============================================
const sectionColors = {
  compute: '#4285F4',
  storage: '#34A853',
  networking: '#EA4335',
  databases: '#FBBC04',
  aiml: '#AB47BC',
  bigdata: '#00BCD4',
  security: '#FF7043',
  devops: '#26A69A',
};

const sectionNames = {
  compute: 'Compute',
  storage: 'Storage',
  networking: 'Networking',
  databases: 'Databases',
  aiml: 'AI & ML',
  bigdata: 'Big Data',
  security: 'Security',
  devops: 'DevOps',
};

// Build legend

  const item = document.createElement('div');
  item.className = 'legend-item';

  legendGrid.appendChild(item);

// =============================================
// TREE SETUP
// =============================================
let allNodes = [];
let allLinks = [];
let selectedNode = null;

function flattenTree(node, parent = null, depth = 0) {
  const n = {
    ...node,
    parent,
    depth,
    collapsed: depth >= 2, // root & sections start expanded
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    fx: null,
    fy: null,
  };
  allNodes.push(n);
  if (node.children) {
    node.children.forEach(child => {
      allLinks.push({ source: node.id, target: child.id });
      flattenTree(child, node.id, depth + 1);
    });
  }
  return n;
}

flattenTree(gcpData);

// Update node count
document.getElementById('node-count').textContent = allNodes.length;

// Get visible nodes
function getVisible() {
  const collapsedIds = new Set();
  allNodes.forEach(n => {
    if (n.collapsed) {
      function markChildren(id) {
        allNodes.forEach(c => {
          if (c.parent === id) {
            collapsedIds.add(c.id);
            markChildren(c.id);
          }
        });
      }
      markChildren(n.id);
    }
  });
  const visibleNodes = allNodes.filter(n => !collapsedIds.has(n.id));
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleLinks = allLinks.filter(l => visibleIds.has(l.source) && visibleIds.has(l.target));
  return { visibleNodes, visibleLinks };
}

// =============================================
// D3 SIMULATION
// =============================================
const svg = d3.select('#svg');
const g = svg.append('g');

let simulation;
let linkSel, nodeSel;

function hasChildren(node) {
  return node.children && node.children.length > 0;
}

function getNodeRadius(d) {
  if (d.level === 1) return 32;
  if (d.level === 2) return 22;
  if (d.level === 3) return 16;
  if (d.level === 4) return 11;
  return 8;
}

function getFontSize(d) {
  if (d.level === 1) return 11;
  if (d.level === 2) return 9.5;
  if (d.level === 3) return 8.5;
  if (d.level === 4) return 7.5;
  return 7;
}

function getLinkDistance(d) {
  const src = allNodes.find(n => n.id === d.source || n.id === (d.source && d.source.id));
  const lvl = src ? src.level : 1;
  if (lvl === 1) return 180;
  if (lvl === 2) return 140;
  if (lvl === 3) return 110;
  return 80;
}

function render() {
  const { visibleNodes, visibleLinks } = getVisible();

  // Links
  const linkData = visibleLinks.map(l => ({
    source: visibleNodes.find(n => n.id === l.source),
    target: visibleNodes.find(n => n.id === l.target),
  })).filter(l => l.source && l.target);

  // Update simulation
  if (simulation) simulation.stop();

  simulation = d3.forceSimulation(visibleNodes)
    .force('link', d3.forceLink(linkData)
      .id(d => d.id)
      .distance(d => {
        const lvl = d.source.level;
        if (lvl === 1) return 200;
        if (lvl === 2) return 160;
        if (lvl === 3) return 120;
        return 90;
      })
      .strength(0.8)
    )
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.level === 1) return -800;
      if (d.level === 2) return -400;
      if (d.level === 3) return -250;
      return -180;
    }))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => getNodeRadius(d) + 12))
    .alphaDecay(0.02)
    .on('tick', ticked);

  // Draw links
  g.selectAll('.link').remove();
  linkSel = g.selectAll('.link')
    .data(linkData)
    .enter()
    .append('line')
    .attr('class', 'link')
    .attr('stroke', d => d.source.color || '#4285F4')
    .attr('stroke-dasharray', d => d.source.level >= 3 ? '4,4' : null);

  // Draw nodes
  g.selectAll('.node').remove();
  nodeSel = g.selectAll('.node')
    .data(visibleNodes, d => d.id)
    .enter()
    .append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd)
    )
    .on('click', (event, d) => {
      event.stopPropagation();
      showPanel(d);
    })
    .on('dblclick', (event, d) => {
      event.stopPropagation();
      if (hasChildren(d)) {
        toggleCollapse(d);
      }
    });

  // Shadow/glow circle
  nodeSel.append('circle')
    .attr('r', d => getNodeRadius(d) + 4)
    .attr('fill', d => d.color || '#4285F4')
    .attr('opacity', 0.08);

  // Main circle
  nodeSel.append('circle')
    .attr('r', d => getNodeRadius(d))
    .attr('fill', d => {
      if (d.level === 1) return d.color;
      if (d.level === 2) return d.color;
      return d.color + '22';
    })
    .attr('stroke', d => d.color || '#4285F4')
    .attr('stroke-width', d => d.level <= 2 ? 2.5 : 1.5)
    .attr('stroke-opacity', d => d.level <= 2 ? 0.9 : 0.6);

  // Icon for root
  nodeSel.filter(d => d.level === 1).append('text')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('y', -6)
    .style('font-size', '14px')
    .text('☁');

  // Label
  nodeSel.each(function(d) {
    const lines = d.name.split('\n');
    const g = d3.select(this);
    const r = getNodeRadius(d);
    const yOffset = d.level === 1 ? r + 14 : r + 11;

    const text = g.append('text')
      .attr('text-anchor', 'middle')
      .attr('y', yOffset)
      .style('font-size', `${getFontSize(d)}px`)
      .style('font-weight', d.level <= 2 ? '600' : '500')
      .style('fill', d.level <= 2 ? d.color : '#c8ccd8')
      .style('font-family', "'IBM Plex Sans', sans-serif");

    lines.forEach((line, i) => {
      text.append('tspan')
        .attr('x', 0)
        .attr('dy', i === 0 ? 0 : '1.15em')
        .text(line);
    });
  });

  // Expand/collapse badge
  nodeSel.filter(d => hasChildren(d) && d.level > 1).each(function(d) {
    const g = d3.select(this);
    const r = getNodeRadius(d);
    const bx = r - 2, by = -r + 2;

    g.append('circle')
      .attr('cx', bx).attr('cy', by)
      .attr('r', 7)
      .attr('fill', '#0d0f14')
      .attr('stroke', d.color)
      .attr('stroke-width', 1.5);

    g.append('text')
      .attr('class', 'expand-badge')
      .attr('x', bx).attr('y', by + 0.5)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', d.color)
      .text(d.collapsed ? '+' : '−');
  });

  // Priority dot
  nodeSel.filter(d => d.priority).each(function(d) {
    const g = d3.select(this);
    const r = getNodeRadius(d);
    const colors = {
      'exam-critical': '#EA4335',
      'new-study': '#4285F4',
      'quick-review': '#FBBC04',
      'skip': '#6b7494',
    };
    g.append('circle')
      .attr('cx', -r + 3).attr('cy', -r + 3)
      .attr('r', 4)
      .attr('fill', colors[d.priority] || '#6b7494')
      .attr('opacity', 0.85);
  });
}

function ticked() {
  if (linkSel) {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
  }
  if (nodeSel) {
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  }
}

// =============================================
// DRAG
// =============================================
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// =============================================
// ZOOM / PAN
// =============================================
const zoom = d3.zoom()
  .scaleExtent([0.15, 3])
  .on('zoom', event => g.attr('transform', event.transform));

svg.call(zoom).on('dblclick.zoom', null);

// Center on load
const w = window.innerWidth, h = window.innerHeight - 56;
svg.call(zoom.transform, d3.zoomIdentity.translate(w/2, h/2));

svg.on('click', () => closePanel());

// =============================================
// COLLAPSE / EXPAND
// =============================================
function toggleCollapse(d) {
  d.collapsed = !d.collapsed;

  // Pulse ring
  const nodeEl = nodeSel.filter(n => n.id === d.id);
  nodeEl.append('circle')
    .attr('class', 'pulse-ring')
    .attr('fill', 'none')
    .attr('stroke', d.color)
    .attr('stroke-width', 2)
    .attr('r', 0)
    .transition().duration(600)
    .attr('r', getNodeRadius(d) + 25)
    .attr('stroke-opacity', 0)
    .remove();

  render();
  simulation.alpha(0.5).restart();
}

function expandAll() {
  allNodes.forEach(n => n.collapsed = false);
  render();
  simulation.alpha(0.8).restart();
}

function collapseAll() {
  allNodes.forEach(n => {
    if (n.level > 1) n.collapsed = true;
  });
  render();
  simulation.alpha(0.8).restart();
}

function resetView() {
  const w = window.innerWidth, h = window.innerHeight - 56;
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(w/2, h/2).scale(0.9)
  );
}

// =============================================
// PANEL
// =============================================
const priorityLabels = {
  'exam-critical': '🔴 Exam Critical',
  'new-study': '🔵 New Study',
  'quick-review': '🟡 Quick Review',
  'skip': '⚪ Skip',
};

function showPanel(d) {
  selectedNode = d;

  nodeSel.classed('selected', false);
  nodeSel.filter(n => n.id === d.id).classed('selected', true);

  const levelNames = ['', 'Platform', 'Category', 'Service', 'Feature', 'Detail'];
  document.getElementById('panel-level').textContent = `Level ${d.level} · ${levelNames[d.level] || ''}`;
  document.getElementById('panel-level').style.color = d.color;
  document.getElementById('panel-name').textContent = d.name.replace('\n', ' ');
  document.getElementById('panel-name').style.color = d.color;

  const parentNode = d.parent ? allNodes.find(n => n.id === d.parent) : null;
  document.getElementById('panel-parent').innerHTML = parentNode
    ? `Under: <span>${parentNode.name.replace('\n', ' ')}</span>`
    : `<span>Root Node</span>`;

  // Priority
  const pb = document.getElementById('panel-priority');
  pb.innerHTML = `<div class="priority-badge ${d.priority}">${priorityLabels[d.priority] || ''}</div>`;

  // Desc
  document.getElementById('panel-desc').textContent = d.desc || 'No description available.';

  // Chips
  const chips = document.getElementById('panel-chips');
  const subtopicSection = document.getElementById('panel-subtopics-section');
  chips.innerHTML = '';
  if (d.subtopics && d.subtopics.length > 0) {
    subtopicSection.style.display = '';
    d.subtopics.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = s;
      chips.appendChild(chip);
    });
  } else {
    subtopicSection.style.display = 'none';
  }

  // Doc link
  const docLink = document.getElementById('panel-doc-link');
  docLink.href = d.docLink || '#';
  document.getElementById('panel-doc-text').textContent = d.docText || 'View Documentation';

  document.getElementById('info-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
  if (nodeSel) nodeSel.classed('selected', false);
  selectedNode = null;
}

// =============================================
// INIT
// =============================================
render();
simulation.alpha(1).restart();

  const w = window.innerWidth, h = window.innerHeight - 56;
  document.getElementById('canvas').style.width = w + 'px';
  document.getElementById('canvas').style.height = (h) + 'px';
});

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Azure – Interactive Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --text: #e2e8f0;
    --text-muted: #6b7a99;
    --text-dim: #3d4560;

    --azure-blue: #0078d4;
    --azure-light: #50e6ff;
    --azure-teal: #00b4d8;

    --c-compute: #0078d4;
    --c-storage: #00b294;
    --c-network: #8764b8;
    --c-database: #e3008c;
    --c-analytics: #f7630c;
    --c-ai: #00b7c3;
    --c-security: #d83b01;
    --c-devops: #ffb900;
    --c-identity: #498205;
    --c-integration: #0099bc;

    --panel-w: 360px;
    --toolbar-h: 56px;

    --badge-exam: #ef4444;
    --badge-new: #8b5cf6;
    --badge-quick: #f59e0b;
    --badge-skip: #475569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--toolbar-h);
    background: rgba(13,15,20,0.95);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .toolbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 16px;
  }

  .azure-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--azure-blue), var(--azure-light));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -1px;
  }

  .toolbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .tb-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .tb-btn:hover {
    background: var(--surface);
    border-color: var(--azure-blue);
    color: var(--text);
  }
  .tb-btn svg { width: 14px; height: 14px; }

  .tb-stat {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .tb-stat span { color: var(--azure-light); }

  /* ── CANVAS ── */
  #canvas {
    position: fixed;
    top: var(--toolbar-h);
    left: 0;
    right: 0;
    bottom: 0;
  }

  svg#graph {
    width: 100%;
    height: 100%;
    background: var(--bg);
  }

  /* ── LINKS ── */
  .link {
    stroke: var(--border);
    stroke-opacity: 0.6;
    fill: none;
    stroke-width: 1.5;
  }
  .link.level-1 { stroke-width: 2.5; stroke-opacity: 0.8; }
  .link.level-2 { stroke-width: 1.8; stroke-opacity: 0.7; }

  /* ── NODES ── */
  .node { cursor: pointer; }

  .node circle {
    stroke-width: 2;
    transition: r 0.2s, filter 0.2s;
  }
  .node:hover circle {
    filter: brightness(1.3) drop-shadow(0 0 8px currentColor);
  }

  .node text {
    font-family: 'IBM Plex Sans', sans-serif;
    fill: var(--text);
    pointer-events: none;
    dominant-baseline: central;
  }

  /* badge +/- */
  .expand-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    pointer-events: none;
  }

  /* pulse ring */
  @keyframes pulseRing {
    0%   { r: 0; opacity: 0.8; }
    100% { r: 40; opacity: 0; }
  }
  .pulse-ring { animation: pulseRing 0.6s ease-out forwards; }

  /* ── DETAIL PANEL ── */
  #panel {
    position: fixed;
    top: var(--toolbar-h);
    right: 0;
    width: var(--panel-w);
    height: calc(100vh - var(--toolbar-h));
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 90;
    overflow: hidden;
  }
  #panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .panel-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
    transition: all 0.15s;
  }
  .panel-close:hover { color: var(--text); border-color: var(--azure-blue); }

  .panel-level-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .panel-name {
    font-size: 18px;
    font-weight: 700;
    font-family: 'IBM Plex Sans Condensed', sans-serif;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .panel-parent {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 10px;
  }
  .panel-parent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .priority-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-exam   { background: rgba(239,68,68,0.15); color: var(--badge-exam); border: 1px solid rgba(239,68,68,0.3); }
  .badge-new    { background: rgba(139,92,246,0.15); color: var(--badge-new); border: 1px solid rgba(139,92,246,0.3); }
  .badge-quick  { background: rgba(245,158,11,0.15); color: var(--badge-quick); border: 1px solid rgba(245,158,11,0.3); }
  .badge-skip   { background: rgba(71,85,105,0.15); color: var(--badge-skip); border: 1px solid rgba(71,85,105,0.3); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel-section { margin-bottom: 20px; }
  .panel-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .panel-desc {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-muted);
  }

  .panel-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover {
    border-color: var(--azure-blue);
    color: var(--azure-light);
    background: rgba(0,120,212,0.1);
  }

  .panel-doc-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(0,120,212,0.08);
    border: 1px solid rgba(0,120,212,0.25);
    border-radius: 6px;
    font-size: 12px;
    color: var(--azure-light);
    text-decoration: none;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
  }
  .panel-doc-link:hover {
    background: rgba(0,120,212,0.15);
    border-color: rgba(0,120,212,0.5);
  }

  .color-bar {
    height: 3px;
    border-radius: 0;
    width: 100%;
    margin-bottom: 0;
  }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(13,15,20,0.92);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    z-index: 90;
    backdrop-filter: blur(12px);
    min-width: 200px;
  }

  .legend-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .legend-items {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-sep {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  .legend-badges {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-muted);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* hint */
  #hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.8;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="toolbar-brand">
    <div class="azure-logo">Az</div>
    <span class="toolbar-title">Microsoft Azure — Mind Map</span>
  </div>
  <div class="toolbar-sep"></div>
  <button class="tb-btn" id="btn-expand-all">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 8h10M8 3v10"/>
    </svg>
    Expand All
  </button>
  <button class="tb-btn" id="btn-collapse-all">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 8h10"/>
    </svg>
    Collapse All
  </button>
  <button class="tb-btn" id="btn-reset">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 8a6 6 0 1 0 1.5-4" stroke-linecap="round"/>
      <path d="M2 4v4h4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Reset View
  </button>
  <div class="toolbar-sep"></div>
  <div class="tb-stat">Nodes: <span id="stat-nodes">0</span> &nbsp;|&nbsp; Visible: <span id="stat-visible">0</span></div>
</div>

<!-- GRAPH CANVAS -->
<div id="canvas">
  <svg id="graph"></svg>
</div>

<!-- DETAIL PANEL -->
<div id="panel">
  <div class="color-bar" id="panel-color-bar"></div>
  <div class="panel-header">
    <div class="panel-close" id="panel-close">✕</div>
    <div class="panel-level-tag" id="panel-level"></div>
    <div class="panel-name" id="panel-name"></div>
    <div class="panel-parent" id="panel-parent"></div>
    <span class="priority-badge" id="panel-badge"></span>
  </div>
  <div class="panel-body">
    <div class="panel-section">
      <div class="panel-section-label">Description</div>
      <div class="panel-desc" id="panel-desc"></div>
    </div>
    <div class="panel-section" id="panel-subtopics-section">
      <div class="panel-section-label">Subtopics</div>
      <div class="panel-chips" id="panel-chips"></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-label">Documentation</div>
      <a class="panel-doc-link" id="panel-doc" href="#" target="_blank">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3M10 2h4v4M14 2 8 8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Open Microsoft Docs ↗
      </a>
    </div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-title">Services</div>
  <div class="legend-items" id="legend-items"></div>
  <div class="legend-sep"></div>
  <div class="legend-title">Priority</div>
  <div class="legend-badges">
    <div class="legend-item"><span class="priority-badge badge-exam" style="font-size:9px">Exam Critical</span></div>
    <div class="legend-item"><span class="priority-badge badge-new" style="font-size:9px">New Study</span></div>
    <div class="legend-item"><span class="priority-badge badge-quick" style="font-size:9px">Quick Review</span></div>
    <div class="legend-item"><span class="priority-badge badge-skip" style="font-size:9px">Skip</span></div>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- HINT -->
<div id="hint">
  Single-click → detail panel<br>
  Double-click → expand / collapse<br>
  Drag → move nodes<br>
  Scroll → zoom
</div>

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getColor(d) {
  if (d.level === 1) return '#0078d4';
  const sec = d.section || d.data?.section;
  return SECTIONS[sec]?.color || '#6b7a99';
}

function getRadius(level) {
  return [0, 30, 22, 15, 10, 7][level] || 7;
}

function getFontSize(level) {
  return [0, 14, 12, 11, 10, 9][level] || 9;
}

function countDescendants(node) {
  if (!node.children && !node._children) return 0;
  const ch = node.children || node._children;
  return ch.reduce((sum, c) => sum + 1 + countDescendants(c), 0);
}

function allNodes(node, arr = []) {
  arr.push(node);
  (node.children || []).forEach(c => allNodes(c, arr));
  (node._children || []).forEach(c => allNodes(c, arr));
  return arr;
}

function getSubtopics(d) {
  const ch = d.children || d._children || [];
  return ch.map(c => c.name);
}

function priorityClass(p) {
  return { exam: 'badge-exam', new: 'badge-new', quick: 'badge-quick', skip: 'badge-skip' }[p] || 'badge-skip';
}
function priorityLabel(p) {
  return { exam: '★ Exam Critical', new: '◆ New Study', quick: '✦ Quick Review', skip: '○ Skip' }[p] || p;
}

// ─────────────────────────────────────────────
// BUILD TREE
// ─────────────────────────────────────────────
function buildTree(data, parent = null) {
  const node = {
    id: data.id,
    name: data.name,
    level: data.level,
    section: data.section,
    priority: data.priority || 'quick',
    desc: data.desc || '',
    doc: data.doc || 'https://docs.microsoft.com/azure',
    parent,
    children: null,
    _children: null,
  };
  if (data.children) {
    const kids = data.children.map(c => buildTree(c, node));
    if (data.level <= 2) {
      node.children = kids;  // root + L2 expanded
    } else {
      node._children = kids; // deeper collapsed
    }
  }
  return node;
}

const root = buildTree(mindmapData);

// ─────────────────────────────────────────────
// D3 SETUP
// ─────────────────────────────────────────────
const svg = d3.select('#graph');
const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.1, 4])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

let simulation, linkSel, nodeSel;

// ─────────────────────────────────────────────
// SIMULATE
// ─────────────────────────────────────────────
function flatten(node, nodes = [], links = []) {
  nodes.push(node);
  if (node.children) {
    node.children.forEach(c => {
      links.push({ source: node, target: c, level: node.level });
      flatten(c, nodes, links);
    });
  }
  return { nodes, links };
}

function update() {
  const { nodes, links } = flatten(root);

  // Update stats
  document.getElementById('stat-nodes').textContent = allNodes(root).length;
  document.getElementById('stat-visible').textContent = nodes.length;

  // Stop existing
  if (simulation) simulation.stop();

  const W = window.innerWidth, H = window.innerHeight - 56;

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      const lv = d.source.level;
      return [0, 200, 160, 120, 90, 70][lv] || 80;
    }).strength(0.6))
    .force('charge', d3.forceManyBody().strength(d => {
      return [-500, -400, -280, -160, -80][d.level] || -60;
    }))
    .force('center', d3.forceCenter(W / 2, H / 2).strength(0.05))
    .force('collision', d3.forceCollide(d => getRadius(d.level) + 18))
    .force('x', d3.forceX(W / 2).strength(0.02))
    .force('y', d3.forceY(H / 2).strength(0.02))
    .alphaDecay(0.025)
    .velocityDecay(0.3);

  // Links
  g.selectAll('.link').remove();
  linkSel = g.selectAll('.link').data(links, d => d.source.id + '-' + d.target.id)
    .join('line')
    .attr('class', d => `link level-${d.level}`)
    .attr('stroke', d => {
      const c = getColor(d.target);
      return c;
    })
    .attr('stroke-opacity', 0.3);

  // Nodes
  g.selectAll('.node').remove();
  nodeSel = g.selectAll('.node').data(nodes, d => d.id)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd))
    .on('click', (e, d) => { e.stopPropagation(); showPanel(d); })
    .on('dblclick', (e, d) => { e.stopPropagation(); toggle(d, e); })
    .on('mouseenter', (e, d) => showTooltip(e, d))
    .on('mouseleave', hideTooltip);

  // Circle
  nodeSel.append('circle')
    .attr('r', d => getRadius(d.level))
    .attr('fill', d => {
      const c = getColor(d);
      return d.level === 1 ? c : c + '22';
    })
    .attr('stroke', d => getColor(d))
    .attr('stroke-width', d => d.level <= 2 ? 2.5 : 1.8);

  // Label
  nodeSel.append('text')
    .text(d => d.name)
    .attr('font-size', d => getFontSize(d.level))
    .attr('font-weight', d => d.level <= 2 ? 700 : 400)
    .attr('dx', d => getRadius(d.level) + 5)
    .attr('dy', '0.35em')
    .attr('fill', d => d.level <= 2 ? '#e2e8f0' : '#94a3b8');

  // +/- badge
  nodeSel.append('text')
    .attr('class', 'expand-badge')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('fill', d => getColor(d))
    .text(d => {
      if (d._children && d._children.length) return '+';
      if (d.children && d.children.length && d.level > 1) return '−';
      return '';
    });

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ─────────────────────────────────────────────
// DRAG
// ─────────────────────────────────────────────
function dragStart(e, d) {
  if (!e.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) {
  if (!e.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ─────────────────────────────────────────────
// TOGGLE
// ─────────────────────────────────────────────
function toggle(d, e) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  } else return;

  // Pulse
  const ring = g.append('circle')
    .attr('cx', d.x).attr('cy', d.y)
    .attr('r', 0)
    .attr('fill', 'none')
    .attr('stroke', getColor(d))
    .attr('stroke-width', 1.5)
    .attr('class', 'pulse-ring');
  setTimeout(() => ring.remove(), 700);

  update();
}

// ─────────────────────────────────────────────
// EXPAND / COLLAPSE ALL
// ─────────────────────────────────────────────
function expandAll(node) {
  if (node._children) { node.children = node._children; node._children = null; }
  (node.children || []).forEach(expandAll);
}
function collapseAll(node, keepL2 = false) {
  if (node.children && node.level > (keepL2 ? 2 : 1)) {
    node._children = node.children; node.children = null;
  }
  (node.children || []).forEach(c => collapseAll(c, keepL2));
}

document.getElementById('btn-expand-all').addEventListener('click', () => {
  expandAll(root); update();
});
document.getElementById('btn-collapse-all').addEventListener('click', () => {
  collapseAll(root, true); update();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
});

// ─────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────
function showPanel(d) {
  const panel = document.getElementById('panel');
  const color = getColor(d);

  document.getElementById('panel-color-bar').style.background = color;
  document.getElementById('panel-level').textContent = `Level ${d.level} · ${SECTIONS[d.section]?.label || 'Root'}`;
  document.getElementById('panel-name').textContent = d.name;
  document.getElementById('panel-name').style.color = color;

  const parentEl = document.getElementById('panel-parent');
  if (d.parent) {
    parentEl.innerHTML = `<span class="panel-parent-dot" style="background:${getColor(d.parent)}"></span> ${d.parent.name}`;
  } else {
    parentEl.textContent = 'Root node';
  }

  const badge = document.getElementById('panel-badge');
  badge.className = `priority-badge ${priorityClass(d.priority)}`;
  badge.textContent = priorityLabel(d.priority);

  document.getElementById('panel-desc').textContent = d.desc;

  // Chips
  const chips = document.getElementById('panel-chips');
  const subtopicsSection = document.getElementById('panel-subtopics-section');
  const subs = getSubtopics(d);
  if (subs.length) {
    subtopicsSection.style.display = '';
    chips.innerHTML = subs.map(s => `<span class="chip">${s}</span>`).join('');
  } else {
    subtopicsSection.style.display = 'none';
  }

  document.getElementById('panel-doc').href = d.doc;

  panel.classList.add('open');
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('open');
});

// ─────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, d) {
  const count = (d.children || d._children || []).length;
  tooltip.textContent = count ? `${d.name}  ·  ${count} children` : d.name;
  tooltip.style.opacity = '1';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.style.opacity = '0'; }

// ─────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────
const legendItems = document.getElementById('legend-items');
Object.entries(SECTIONS).forEach(([key, val]) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-dot" style="background:${val.color}"></span>${val.label}`;
  legendItems.appendChild(el);
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
update();

// Center on root after sim settles
setTimeout(() => {
  const W = window.innerWidth, H = window.innerHeight - 56;
  svg.transition().duration(800).call(
    zoom.transform,
    d3.zoomIdentity.translate(W / 2, H / 2).scale(0.75).translate(-W / 2, -H / 2)
  );
}, 1200);
</script>
</body>
